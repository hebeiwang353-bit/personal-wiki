[proxy]
port = 8765
context_max_tokens = 1500

# 上游路由配置
# 用户可根据自己使用的 AI 工具修改 target 地址

[[upstreams]]
name = "claude"
format = "anthropic"
target = "https://api.anthropic.com"

[[upstreams]]
name = "openai"
format = "openai"
target = "https://api.openai.com"

[[upstreams]]
name = "deepseek"
format = "openai"
target = "https://api.deepseek.com"

[[upstreams]]
name = "ollama"
format = "openai"
target = "http://localhost:11434"
